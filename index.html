  <!-- Use local/system font fallbacks to avoid external font blocking. -->
  <style>
    :root {
      --font-display: "Avenir Next", "SF Pro Display", "Helvetica Neue", "Segoe UI", Arial, sans-serif;
      --font-body: "Avenir Next", "SF Pro Text", "Helvetica Neue", "Segoe UI", Arial, sans-serif;
      --font-mono: "SF Mono", "IBM Plex Mono", "Avenir Next", "Helvetica Neue", monospace;
      --bg: #060810;
      --bg2: #0a0e1a;
      --bg3: #0f1422;
      --card: #111827;
      --card2: #161f32;
      --border: #1a2540;
      --border2: #243050;
      --neon-blue: #e63946;
      --neon-blue-dim: rgba(230,57,70,0.12);
      --neon-blue-glow: rgba(230,57,70,0.25);
      --neon-red: #ff2d55;
      --neon-red-dim: rgba(255,45,85,0.12);
      --neon-green: #00ff88;
      --neon-green-dim: rgba(0,255,136,0.12);
      --text: #ffffff;
      --text-dim: #a8b4cc;
      --text-bright: #ffffff;
      --accent: #e63946;
      --accent2: #4cc9f0;
      --r-sm: 6px;
      --r-md: 12px;
      --r-lg: 20px;
      --r-xl: 28px;
    }

/* =====================
   LIGHT THEME VARIABLES
===================== */
[data-theme="light"] {
  --bg: #faf9f8;
  --bg2: #f3f1ef;
  --bg3: #ece9e4;
  --card: #ffffff;
  --card2: #f8f7f5;
  --border: #e0dbd5;
  --border2: #cec8c0;
  --neon-blue: #e63946;
  --neon-blue-dim: rgba(230,57,70,0.08);
  --neon-blue-glow: rgba(230,57,70,0.15);
  --neon-red: #cc2244;
  --neon-red-dim: rgba(204,34,68,0.1);
  --neon-green: #008844;
  --neon-green-dim: rgba(0,136,68,0.08);
  --text: #1a1008;
  --text-dim: #5a5048;
  --text-bright: #0a0804;
  --accent: #cc2244;
  --accent2: #aa1830;
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-2xl: 28px;
}

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.65;
      letter-spacing: 0.005em;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    h1, h2, h3, h4 {
      font-family: var(--font-display);
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    button, input, textarea, select {
      font-family: inherit;
    }

    .hero__title,
    .hero__price-presale,
    .hero__price-retail,
    .hero__price-badge,
    .sec-title,
    .story2__hero-title,
    .story2__hero-label,
    .spotlight__title,
    .spotlight__title--primary,
    .spotlight__title--sub,
    .spotlight__subtitle,
    .feat-card__title,
    .factory-stat__num,
    .impact-num,
    .num-feat__num,
    .num-feat__title,
    .cert-card__stat,
    .cert-card__title,
    .spec-cell,
    .faq-q,
    .final-cta__title,
    .story__title,
    .story__metric-num,
    .problem-card__title,
    .problem-item strong {
      font-family: var(--font-display);
      letter-spacing: -0.03em;
    }

    .sec-label,
    .hero__eyebrow,
    .hero__cta,
    .nav__links a,
    .nav__cta,
    .impact-label,
    .factory-stat__label,
    .feat-card__desc,
    .sec-sub,
    .story2__hero-desc,
    .hero__desc,
    .problem-item__text,
    .cert-card__label,
    .faq-a,
    .final-cta__sub,
    .footer,
    .footer * {
      font-family: var(--font-body);
    }

    .hero__eyebrow,
    .sec-label,
    .hero__price-badge {
      letter-spacing: 0.16em;
    }

    .hero__price-presale,
    .hero__price-retail,
    .hero__price-badge,
    .num-feat__num,
    .factory-stat__num,
    .impact-num,
    .cert-card__stat,
    .data-item__num,
    .spec-cell strong {
      font-family: var(--font-mono);
      letter-spacing: -0.02em;
    }

    img { display: block; max-width: 100%; }

    .container { max-width: 1240px; margin: 0 auto; padding: 0 28px; }

    
    /* Carousel dots for posture showcase */
    .posture-dots {
      display: flex; gap: 8px; justify-content: center; align-items: center;
      margin-top: 12px;
    }
    .posture-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.25); transition: all 0.3s;
    }
    .posture-dot.active {
      background: var(--neon-red); width: 20px; border-radius: 4px;
    }
/* =====================
       BACKGROUND FX
    ===================== */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 40% at 50% -10%, rgba(0,212,255,0.07) 0%, transparent 55%),
        radial-gradient(ellipse 50% 35% at 85% 70%, rgba(0,212,255,0.04) 0%, transparent 50%),
        linear-gradient(rgba(26,37,64,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,37,64,0.3) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 48px 48px, 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* =====================
       DUAL-MATERIAL SECTION
    ===================== */
    .dual-material-section {
      padding: 80px 28px;
      position: relative; z-index: 1;
      background: var(--bg);
    }
    .dual-material-section .container {
      max-width: 1300px;
      padding: 0;
    }
    .dual-material-showcase {
      max-width: 1240px;
      margin: 40px auto 0;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(230,57,70,0.1);
      transition: all 0.3s;
    }
    .dual-material-showcase:hover {
      border-color: rgba(230,57,70,0.25);
    }
    .dual-material-showcase img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s;
    }
    .dual-img-mobile { display: none !important; }
    .dual-img-desktop { display: block !important; }
    .dual-material-showcase:hover img {
      transform: scale(1.02);
    }
    @media (max-width: 768px) {
      .dual-material-section { padding: 32px 16px; }
      .dual-material-section .container { padding: 0; }
      .dual-material-showcase { border-radius: 16px; }
      .dual-img-mobile { display: block !important; }
      .dual-img-desktop { display: none !important; }
      .vs-section { padding: 32px 16px; }
      .vs-showcase { border-radius: 16px; }
      .rgb-section { padding: 32px 16px; }
      .rgb-showcase { border-radius: 16px; }
    }

    /* =====================
       ACCESSORIES SECTION
    ===================== */
    .accessories-section {
      padding: 80px 28px;
      position: relative; z-index: 1;
      background: var(--bg);
    }
    .accessories-showcase {
      max-width: 1100px;
      margin: 40px auto 0;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(230,57,70,0.1);
      transition: all 0.3s;
    }
    .accessories-showcase:hover {
      border-color: rgba(230,57,70,0.25);
    }
    .accessories-showcase img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s;
    }
    .accessories-showcase:hover img {
      transform: scale(1.02);
    }
    .press-email {
      color: var(--neon-red);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .press-email:hover {
      color: var(--text-bright);
    }
    @media (max-width: 768px) {
      .accessories-section { padding: 60px 16px; }
      .accessories-showcase { border-radius: 16px; }
    }

    /* =====================
       HUD CORNER DECORATION (shared)
    ===================== */
    .hud-card {
      position: relative;
    }
    .hud-card::before,
    .hud-card::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      pointer-events: none;
      opacity: 0.5;
    }
    .hud-card::before {
      top: 12px; left: 12px;
      border-top: 1.5px solid var(--neon-blue);
      border-left: 1.5px solid var(--neon-blue);
    }
    .hud-card::after {
      bottom: 12px; right: 12px;
      border-bottom: 1.5px solid var(--neon-blue);
      border-right: 1.5px solid var(--neon-blue);
    }
    .hud-card:hover::before,
    .hud-card:hover::after { opacity: 0.9; }

    /* Scan-line accent on hero */
    .scan-line {
      position: relative; overflow: hidden;
    }
    .scan-line::after {
      content: '';
      position: absolute;
      top: -100%; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
      animation: scanDown 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes scanDown {
      0% { top: -2px; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.5; }
      100% { top: 100%; opacity: 0; }
    }

    /* =====================
       NAV
    ===================== */
    .theme-toggle {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px; cursor: pointer;
      color: var(--text-dim); font-size: 1.1rem;
      transition: all 0.2s; margin-left: auto; margin-right: 8px;
    }
    .theme-toggle:hover {
      border-color: var(--neon-blue); color: var(--neon-blue);
      background: var(--neon-blue-dim);
    }
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(6,8,16,0.88);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
      height: 60px;
    }
    .nav__logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }
    .nav__logo img { height: 48px; width: auto; display: block; }
    .nav__links { display: flex; gap: 28px; align-items: center; height: 100%; }
    .nav__links a {
      font-size: 0.875rem; color: var(--text-dim); text-decoration: none;
      letter-spacing: 0.04em; transition: color 0.2s;
    }
    [data-theme="dark"] .nav__links a,
    :root:not([data-theme="light"]) .nav__links a {
      color: rgba(255,255,255,0.75);
    }
    [data-theme="dark"] .nav__links a:hover {
      color: rgba(255,255,255,1);
    }
    .nav__links a:hover { color: var(--text-bright); }
    .nav__cta {
      background: linear-gradient(135deg, var(--accent), #c8203a);
      color: #fff; border: none; border-radius: var(--r-sm);
      padding: 9px 22px; font-size: 0.875rem; font-weight: 600;
      cursor: pointer; text-decoration: none; letter-spacing: 0.02em;
      box-shadow: 0 4px 20px rgba(230,57,70,0.3);
      transition: all 0.2s;
      text-shadow: 0 0 8px rgba(255,255,255,0.3);
    }
    .nav__cta:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(230,57,70,0.45); }
    .nav__menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }

    /* =====================
       HERO — split layout (left content / right product visual)
    ===================== */
    .hero {
      position: relative;
      z-index: 1;
      padding: 100px 28px 0;
    }
    .hero__grid {
      max-width: 1320px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    /* LEFT — content column */
    .hero__left {
      display: flex; flex-direction: column;
      gap: 20px;
      min-width: 0;
    }
    .hero__eyebrow {
      align-self: flex-start;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 16px;
      border: 1px solid rgba(0,212,255,0.3);
      background: rgba(0,212,255,0.08);
      border-radius: 100px;
      font-size: 0.875rem; font-weight: 700;
      color: var(--neon-blue);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .hero__eyebrow .pulse {
      width: 7px; height: 7px; background: var(--neon-blue);
      border-radius: 50%; animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
    [data-theme="light"] .hero__eyebrow {
      background: rgba(204,34,68,0.08);
      border-color: rgba(204,34,68,0.3);
      color: var(--accent);
    }
    [data-theme="light"] .hero__eyebrow .pulse { background: var(--accent); }

    .hero__title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(4.5rem, 8vw, 7.5rem);
      font-weight: 800;
      color: var(--text-bright);
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin: 0;
    }
    .hero__title .strike {
      position: relative;
      color: var(--text-dim);
      font-weight: 600;
    }
    .hero__title .strike::after {
      content: '';
      position: absolute;
      left: -2px; right: -2px;
      top: 55%;
      height: 3px;
      background: var(--neon-red);
      transform: rotate(-3deg);
    }
    
    
    

    .hero__desc {
      font-size: clamp(0.95rem, 1.6vw, 1.1rem);
      color: var(--text-dim);
      line-height: 1.65;
      max-width: 540px;
      margin: 0;
    }
    [data-theme="light"] .hero__desc { color: #5a5048; }
    :root:not([data-theme="light"]) .hero__desc { color: rgba(255,255,255,0.7); }
    .hero__desc strong { color: var(--text-bright); font-weight: 600; }

    /* CTA row (primary + secondary) */
    .hero__ctas {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-top: 6px;
    }
    .hero__cta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px;
      border-radius: var(--r-md);
      font-size: 0.95rem; font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.01em;
      border: 1px solid transparent;
    }
    .hero__cta--primary {
      background: linear-gradient(135deg, #e63946 0%, #c8203a 50%, #a81830 100%);
      color: #fff;
      box-shadow: 0 4px 24px rgba(230,57,70,0.35);
    }
    [data-theme="light"] .hero__cta--primary {
      background: linear-gradient(135deg, #cc2244, #aa1830);
      color: #fff;
      box-shadow: 0 4px 24px rgba(204,34,68,0.3);
    }
    .hero__cta--primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(230,57,70,0.5);
    }
    .hero__cta--secondary {
      background: transparent;
      color: var(--text-bright);
      border: 1px solid rgba(255,255,255,0.25);
    }
    [data-theme="light"] .hero__cta--secondary {
      color: #0a0804;
      border: 1px solid rgba(0,0,0,0.2);
    }
    .hero__cta--secondary:hover {
      border-color: var(--neon-blue);
      color: var(--neon-blue);
    }

    /* Trust checkmark row */
    /* Hero Price Tag */
    .hero__price {
      display: flex; align-items: baseline; gap: 12px;
      margin: 4px 0 8px;
      flex-wrap: wrap;
    }
    .hero__price-presale {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.4rem; font-weight: 800;
      color: var(--neon-green);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .hero__price-retail {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem; font-weight: 500;
      color: var(--text-dim);
    }
    .hero__price-retail .strike { color: var(--text-dim); opacity: 0.6; }
    .hero__price-retail .strike::after {
      background: var(--text-dim);
      height: 2px;
    }
    .hero__price-badge {
      display: inline-flex; align-items: center;
      background: var(--neon-green-dim);
      border: 1px solid rgba(0,255,136,0.3);
      color: var(--neon-green);
      font-size: 0.875rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
    }
    [data-theme="light"] .hero__price-presale { color: #008844; }
    [data-theme="light"] .hero__price-badge {
      background: rgba(0,136,68,0.1);
      border-color: rgba(0,136,68,0.3);
      color: #008844;
    }

    /* Hero Selling Points Carousel */
    .hero__carousel {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 16px;
      max-width: 100%;
    }
    @media (max-width: 600px) {
      .hero__carousel {
        gap: 8px;
      }
      .carousel-card {
        padding: 10px 14px;
        font-size: 0.875rem;
      }
    }
    @media (max-width: 480px) {
      .hero__carousel {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .carousel-card {
        padding: 8px 10px !important;
        font-size: 0.875rem !important;
        gap: 5px !important;
        border-radius: 12px !important;
        white-space: normal !important;
        line-height: 1.3 !important;
        text-align: left !important;
        flex: 0 0 auto !important;
        display: flex !important;
        align-items: center !important;
      }
      .carousel-dot {
        font-size: 0.875rem !important;
        flex-shrink: 0 !important;
        min-width: 0.4rem !important;
      }
      .sec-title {
        font-size: 1.25rem;
        margin-bottom: 10px;
      }
      .sec-sub {
        font-size: 0.875rem;
        line-height: 1.5;
      }
      .sec-header {
        margin-bottom: 32px;
      }
      .sec-label {
        font-size: 0.875rem;
        margin-bottom: 8px;
      }
      .data-banner__inner {
        grid-template-columns: 1fr 1fr;
        padding: 0 8px;
        gap: 1px;
      }
      .data-item {
        padding: 16px 8px;
      }
      .data-item__num {
        font-size: 1.2rem;
      }
      .data-item__label {
        font-size: 0.75rem;
        letter-spacing: 0.05em;
      }
    }
    .carousel-card {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: 8px;
      background: rgba(230,57,70,0.06);
      border: 1px solid rgba(230,57,70,0.15);
      border-radius: 12px;
      padding: 11px 18px;
      font-size: clamp(0.82rem, 1.4vw, 0.95rem);
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
      white-space: normal;
      transition: all 0.2s;
      line-height: 1.3;
    }
    .carousel-card:hover {
      border-color: var(--neon-red);
      background: rgba(230,57,70,0.1);
    }
    .carousel-dot {
      font-size: 0.875rem;
      line-height: 1;
    }
    [data-theme="light"] .carousel-card {
      background: rgba(204,34,68,0.06);
      border-color: rgba(204,34,68,0.15);
      color: var(--text-bright);
    }
    [data-theme="light"] .carousel-card:hover {
      border-color: var(--accent);
      background: rgba(204,34,68,0.1);
    }
    [data-theme="light"] .hero__trust-item .check { color: var(--accent); }

    /* Inline form (anchored for primary CTA) */
    .hero__form {
      display: flex; gap: 8px;
      width: 100%;
      max-width: 520px;
      margin-top: 10px;
    }
    .hero__form input {
      flex: 1;
      background: rgba(17,24,39,0.8); border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--r-md); padding: 13px 18px;
      color: var(--text-bright); font-size: 0.9rem;
      outline: none; transition: all 0.25s;
    }
    [data-theme="light"] .hero__form input {
      background: #fff; border-color: #d0d8ee; color: #0a0804;
    }
    .hero__form input:focus {
      border-color: var(--neon-blue);
      box-shadow: 0 0 0 3px var(--neon-blue-glow);
    }
    .hero__form input::placeholder { color: rgba(255,255,255,0.5); }
    [data-theme="light"] .hero__form input::placeholder { color: #8a7060; }
    .hero__form button {
      background: linear-gradient(135deg, #e63946, #c8203a);
      color: #fff; border: none;
      border-radius: var(--r-md); padding: 13px 24px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      white-space: nowrap;
      transition: all 0.25s;
      flex: 0 0 auto;
      width: auto;
      min-width: 0;
    }
    .hero__form button:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(230,57,70,0.4); }

    .form-consent {
      display: block;
      width: 100%;
      max-width: 520px;
      font-size: 0.875rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
      text-align: left;
      margin-top: 6px;
    }
    .form-consent a { color: var(--neon-blue); text-decoration: none; }
    .form-consent a:hover { text-decoration: underline; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* RIGHT — product visual with floating spec labels */
    .hero__right {
      position: relative;
      width: 100%;
      min-width: 0;
      height: auto;
      max-height: none;
    }
    .hero__right img {
      max-height: none;
      object-fit: contain;
    }
    .hero__product-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid rgba(230,57,70,0.2);
      background: linear-gradient(160deg, var(--bg2), var(--bg3));
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    [data-theme="light"] .hero__product-wrap {
      background: linear-gradient(160deg, #f8f7f5, #ece9e4);
      box-shadow: 0 30px 80px rgba(0,0,0,0.12);
    }
    .hero__product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      background: var(--bg2);
    }
    /* Floating spec labels — 4 corners */
    .hero__spec {
      position: absolute;
      padding: 10px 14px;
      background: rgba(6,8,16,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--neon-blue);
      border-radius: var(--r-sm);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      min-width: 110px;
    }
    [data-theme="light"] .hero__spec {
      background: rgba(255,255,255,0.95);
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .hero__spec--tl { top: 16px; left: 16px; }
    .hero__spec--tr { top: 16px; right: 16px; }
    .hero__spec--bl { bottom: 16px; left: 16px; }
    .hero__spec--br { bottom: 16px; right: 16px; }
    .hero__spec-label {
      font-size: 0.875rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .hero__spec-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--neon-blue);
    }
    [data-theme="light"] .hero__spec-value { color: var(--accent); }

    /* Play button (centered over product image) */
    .hero__play-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(230,57,70,0.9);
      border: 3px solid rgba(255,255,255,0.9);
      color: #fff;
      font-size: 2.4rem;
      cursor: pointer;
      transition: all 0.25s;
      backdrop-filter: blur(8px);
      z-index: 2;
      padding-left: 6px;
      box-shadow: 0 8px 40px rgba(230,57,70,0.45);
    }
    .hero__play-btn:hover {
      background: rgba(230,57,70,1);
      border-color: #fff;
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 10px 50px rgba(230,57,70,0.6);
    }

    /* Bottom trust strip — full width below hero grid */
    .hero__strip {
      width: 100%;
      max-width: 1320px;
      margin: 60px auto 0;
      padding: 24px 28px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      align-items: center;
      box-sizing: border-box;
    }
    [data-theme="light"] .hero__strip { background: #f8f7f5; }
    .hero__strip-item {
      display: flex; align-items: center; gap: 12px;
      padding: 0 8px;
    }
    .hero__strip-item:not(:last-child) {
      border-right: 1px solid var(--border);
    }
    .hero__strip-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--neon-blue);
    }
    [data-theme="light"] .hero__strip-num { color: var(--accent); }
    .hero__strip-num.green { color: #00ff88; }
    [data-theme="light"] .hero__strip-num.green { color: #008844; }
    .hero__strip-icon { font-size: 1.4rem; }
    .hero__strip-label {
      font-size: 0.875rem;
      color: var(--text-dim);
      line-height: 1.3;
    }
    .hero__strip-label strong {
      display: block;
      color: var(--text-bright);
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 2px;
    }

    /* =====================
       BENEFIT PROOF — hero follow-up
    ===================== */
    .benefit-proof {
      padding: 24px 28px 16px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .benefit-proof__inner {
      max-width: 960px;
      margin: 0 auto;
    }
    .benefit-proof__eyebrow {
      display: inline-block;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--neon-blue);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    [data-theme="light"] .benefit-proof__eyebrow { color: var(--accent); }
    .benefit-proof__title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 700;
      color: var(--text-bright);
      margin: 0 0 12px;
      letter-spacing: -0.01em;
    }
    .benefit-proof__lead {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1rem, 2vw, 1.4rem);
      font-weight: 500;
      line-height: 1.5;
      color: var(--text-bright);
      margin: 0;
      letter-spacing: 0;
    }
    .benefit-proof__lead .accent {
      color: var(--neon-blue);
    }
    [data-theme="light"] .benefit-proof__lead .accent { color: var(--accent); }
    .benefit-proof__data {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 760px;
      margin: 0 auto;
    }
    .benefit-proof__stat {
      padding: 32px 24px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      transition: border-color 0.3s;
    }
    .benefit-proof__stat:hover {
      border-color: var(--neon-blue);
    }
    [data-theme="light"] .benefit-proof__stat:hover { border-color: var(--accent); }
    .benefit-proof__num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      font-weight: 700;
      color: var(--neon-blue);
      line-height: 1;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    [data-theme="light"] .benefit-proof__num { color: var(--accent); }
    .benefit-proof__num .unit {
      font-size: 0.875rem;
      color: var(--text-dim);
      font-weight: 500;
      margin-left: 2px;
    }
    .benefit-proof__label {
      font-size: 0.95rem;
      color: var(--text-dim);
      line-height: 1.4;
    }
    @media (max-width: 600px) {
      .benefit-proof { padding: 60px 16px; }
      .benefit-proof__data { grid-template-columns: 1fr; gap: 16px; }
    }

    /* Responsive — collapse to single column */
    @media (max-width: 900px) {
      .hero { padding: 100px 16px 0; }
      .hero__grid {
        grid-template-columns: 1fr;
        gap: 48px;
      }
      .hero__right { order: -1; }
      .hero__strip {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 16px;
      }
      .hero__strip-item:not(:last-child) { border-right: none; }
      .hero__strip-item:nth-child(odd):not(:last-child) {
        border-right: 1px solid var(--border);
      }
    }
    @media (max-width: 500px) {
      .hero__strip { grid-template-columns: 1fr; }
      .hero__strip-item { border-right: none !important; padding: 8px 0; border-bottom: 1px solid var(--border); }
      .hero__strip-item:last-child { border-bottom: none; }
      .hero__form { flex-direction: column; }
      .hero__form button { width: 100%; }
      .hero__ctas { flex-direction: column; align-items: stretch; }
      .hero__cta { justify-content: center; }
    }

    /* Hero social proof row */
    .hero__social-proof {
      width: 100%;
      max-width: 480px;
      margin-top: 18px;
      padding: 12px 16px;
      background: rgba(230,57,70,0.06);
      border: 1px solid rgba(230,57,70,0.15);
      border-radius: var(--r-sm);
      font-size: 0.875rem;
      color: var(--text);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .hero__social-proof .proof-num {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      color: var(--neon-blue);
      font-size: 1.05rem;
    }
    .hero__social-proof .proof-dot { color: var(--text-dim); }

    /* Hero countdown */
    .hero__countdown {
      width: 100%;
      max-width: 480px;
      margin-top: 14px;
      padding: 14px 16px;
      background: rgba(17,24,39,0.6);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .countdown-label {
      font-size: 0.875rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .countdown-grid { display: flex; gap: 6px; margin-left: auto; }
    .countdown-cell {
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border2);
      border-radius: var(--r-sm);
      padding: 6px 8px;
      text-align: center;
      min-width: 52px;
    }
    .countdown-cell > span:first-child {
      display: block;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--neon-blue);
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.1;
    }
    .countdown-cell .cd-label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 3px;
    }

    /* Mobile nav drawer */
    .mobile-nav {
      position: fixed; inset: 0;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s;
    }
    .mobile-nav.open { pointer-events: auto; opacity: 1; visibility: visible; }
    .mobile-nav__backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
    }
    .mobile-nav__panel {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 280px; max-width: 80vw;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      padding: 80px 28px 28px;
      display: flex; flex-direction: column; gap: 4px;
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }
    .mobile-nav.open .mobile-nav__panel { transform: translateX(0); }
    .mobile-nav__panel a {
      padding: 14px 0;
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      border-bottom: 1px solid var(--border);
      transition: color 0.2s;
    }
    .mobile-nav__panel a:hover { color: var(--neon-blue); }
    .mobile-nav__panel a:last-child { border-bottom: none; }
    /* Video lightbox */
    .video-lightbox {
      position: fixed; inset: 0;
      z-index: 300;
      display: none;
      align-items: center; justify-content: center;
    }
    .video-lightbox.open { display: flex; }
    .video-lightbox__backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
    }
    .video-lightbox__content {
      position: relative;
      width: 90%; max-width: 800px;
      aspect-ratio: 16/9;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .video-lightbox__close {
      position: absolute; top: 12px; right: 12px;
      width: 36px; height: 36px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: 1px solid var(--border2);
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      z-index: 2;
    }
    .video-lightbox__close:hover { background: rgba(255,45,85,0.4); }
    .video-lightbox__placeholder {
      text-align: center;
      padding: 40px 24px;
    }
    .video-lightbox__icon {
      font-size: 3rem;
      color: var(--neon-blue);
      margin-bottom: 16px;
    }
    .video-lightbox__placeholder h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      color: var(--text-bright);
      margin-bottom: 12px;
    }
    .video-lightbox__placeholder p {
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    /* Cookie consent banner */
    .cookie-banner {
      position: fixed; bottom: 16px; left: 16px; right: 16px;
      max-width: 560px;
      margin: 0 auto;
      z-index: 150;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
      align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .cookie-banner.show { display: flex; }
    .cookie-banner p {
      flex: 1;
      min-width: 200px;
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.5;
      margin: 0;
    }
    .cookie-banner p a { color: var(--neon-blue); text-decoration: none; }
    .cookie-banner p a:hover { text-decoration: underline; }
    .cookie-banner__actions { display: flex; gap: 8px; }
    .cookie-banner__decline,
    .cookie-banner__accept {
      padding: 8px 16px;
      border-radius: var(--r-sm);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border2);
    }
    .cookie-banner__decline {
      background: transparent;
      color: var(--text-dim);
    }
    .cookie-banner__decline:hover { color: var(--text); border-color: var(--text-dim); }
    .cookie-banner__accept {
      background: linear-gradient(135deg, #e63946, #c8203a);
      color: #fff;
      border-color: transparent;
    }
    .cookie-banner__accept:hover { opacity: 0.92; }

    .hero__stats {
      display: flex; gap: 36px; flex-wrap: wrap;
      margin-top: 40px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }
    .hero__stat { }
    .hero__stat-num {
      font-family: 'Space Grotesk', 'Courier New', monospace;
      font-size: 1.6rem; font-weight: 700; color: var(--neon-blue);
    }
    [data-theme="light"] .hero__stat-num { color: #cc2244; }
    :root:not([data-theme="light"]) .hero__stat-num { color: #00d4ff; }
    .hero__stat-num span { font-size: 1rem; color: var(--neon-blue); }
    .hero__stat-label { font-size: 0.875rem; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.04em; font-weight: 500; }
    [data-theme="light"] .hero__stat-label { font-weight: 600; }

    /* Secretlab-style quote block in hero */
    .hero__quote {
      margin-top: 32px;
      padding: 20px 24px;
      background: rgba(0,212,255,0.04);
      border: 1px solid rgba(0,212,255,0.15);
      border-left: 3px solid var(--neon-blue);
      border-radius: 0 var(--r-md) var(--r-md) 0;
    }
    [data-theme="light"] .hero__quote {
      background: rgba(204,34,68,0.04);
      border-color: rgba(204,34,68,0.15);
      border-left-color: #cc2244;
    }
    .hero__quote-text {
      font-size: 0.95rem; font-style: italic;
      color: var(--text-body);
      line-height: 1.65;
      margin-bottom: 8px;
    }
    [data-theme="light"] .hero__quote-text { color: #3a3028; }
    :root:not([data-theme="light"]) .hero__quote-text { color: rgba(255,255,255,0.8); }
    .hero__quote-text strong { color: var(--text-bright); font-style: normal; }
    .hero__quote-text em { color: var(--neon-blue); font-style: normal; }
    [data-theme="light"] .hero__quote-text em { color: #cc2244; }
    .hero__quote-source {
      font-size: 0.875rem; font-weight: 700;
      color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* Secretlab-style spec pills in hero */
    .hero__specs {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-top: 20px; justify-content: center;
    }
    .hero__spec-pill {
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,212,255,0.06);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 0.875rem; font-weight: 600;
      color: var(--neon-blue);
      letter-spacing: 0.04em;
    }
    [data-theme="light"] .hero__spec-pill {
      background: rgba(204,34,68,0.06);
      border-color: rgba(204,34,68,0.2);
      color: #cc2244;
    }
    .hero__spec-pill__num {
      font-family: 'Courier New', monospace;
      font-weight: 700;
    }
    .hero__spec-pill__label {
      color: var(--text-dim); font-weight: 400;
    }
    [data-theme="light"] .hero__spec-pill__label { color: #8a7060; }

    /* Hero Visual */
    .hero__visual {
      position: relative;
    }
    .hero__visual img {
      width: 100%; max-width: 620px; border-radius: var(--r-xl);
      box-shadow:
        0 0 0 1px rgba(0,212,255,0.12),
        0 32px 80px rgba(0,0,0,0.7),
        0 0 80px rgba(0,212,255,0.06);
    }
    .hero__tags {
      position: absolute; inset: 0; pointer-events: none;
    }
    .hero__tag {
      position: absolute;
      background: rgba(6,8,16,0.92);
      border: 1px solid var(--border2);
      border-radius: 100px; padding: 8px 18px;
      font-size: 0.875rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      backdrop-filter: blur(16px);
      white-space: nowrap;
    }
    .hero__tag-blue { color: var(--neon-blue); border-color: rgba(0,212,255,0.3); top: 10%; right: -5%; }
    .hero__tag-red { color: var(--neon-red); border-color: rgba(255,45,85,0.3); bottom: 25%; left: -5%; }
    .hero__tag-green { color: var(--neon-green); border-color: rgba(0,255,136,0.3); bottom: 10%; right: -5%; }

    /* =====================
       POSTURE SHOWCASE (Hero visual)
    ===================== */
    .posture-section {
      max-width: 1300px;
      margin: 0 auto;
      padding: 8px 16px 32px;
    }
    .posture-section__label {
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 24px;
    }
    .posture-section__label span:nth-child(1),
    .posture-section__label span:nth-child(3) {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border-color));
    }
    .posture-section__label span:nth-child(3) {
      background: linear-gradient(to left, transparent, var(--border-color));
    }
    [data-theme="light"] .posture-section__label { color: rgba(204,34,68,0.7); }
    .posture-showcase {
      display: flex;
      gap: 8px;
      overflow: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 0;
      scrollbar-width: none;
      border-radius: 24px;
    }
    .posture-showcase::-webkit-scrollbar { display: none; }
    .posture-panel {
      flex: 0 0 70%;
      scroll-snap-align: start;
      min-width: 0;
    }
    @media (max-width: 500px) {
